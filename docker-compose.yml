services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: signalfeed
      POSTGRES_USER: signalfeed
      POSTGRES_PASSWORD: signalfeed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalfeed -d signalfeed"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_NAME: SignalFeed API
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://signalfeed:signalfeed@db:5432/signalfeed
      COLLECTION_INTERVAL_MINUTES: 15
      DEFAULT_MIN_ENGAGEMENT: 10
      ENABLE_AI_FILTER: "false"
      USE_TWITTER_API: "false"
      ENABLE_SELENIUM_X: "false"
      REDDIT_CLIENT_ID: ""
      REDDIT_CLIENT_SECRET: ""
      REDDIT_USER_AGENT: signalfeed/0.1
      TWITTER_BEARER_TOKEN: ""
      LLM_API_KEY: ""
      LLM_API_URL: ""
      LLM_MODEL: gpt-4o-mini
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend

  bot:
    build: ./bot
    profiles: ["bot"]
    environment:
      TELEGRAM_BOT_TOKEN: ""
      SIGNALFEED_API_BASE: http://backend:8000
      DEFAULT_FILTER_MIN_ENGAGEMENT: 10
    depends_on:
      - backend

volumes:
  pgdata:
